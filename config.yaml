# Single source of truth for every behavioral knob in the pipeline.
# Nothing behavioral should be hardcoded in src/ — if it changes run-to-run
# or channel-to-channel, it lives here.

channel:
  niche: "AI-narrated short horror stories"
  format: "vertical_short"          # informational; video is always 1080x1920
  min_duration_sec: 40
  max_duration_sec: 58

run:
  destination: "drive"              # "drive" | "youtube"
  publish_mode: "review"            # "review" (unlisted) | "public" — only used when destination is "youtube"
  history_window: 25                # how many past premises/twists to show the LLM to avoid repeats

llm:
  provider: "anthropic"             # "gemini" | "anthropic" — temporarily on anthropic; Gemini free-tier key hit a 403 (see project notes)
  gemini:
    model: "gemini-2.5-flash"       # verify at aistudio.google.com/models before relying on this long-term
  anthropic:
    model: "claude-sonnet-5"        # billed separately from a Claude.ai/Pro subscription — see README

# Rotating narrator persona. pipeline.py picks the next entry (round-robin,
# tracked in state/history.json) so the channel has a consistent voice
# per-video instead of a different one every run, while still cycling.
personas:
  - name: "The Night Clerk"
    tone: "calm, deadpan, slightly weary — like someone who has seen too much"
    signoff: "...and that's the last booking I ever took on the graveyard shift."
  - name: "Auntie Vex"
    tone: "warm but unsettling, folksy storyteller with a sharp edge"
    signoff: "Sleep tight now. Or don't. Your choice."
  - name: "Dr. Marlowe"
    tone: "clinical, precise, a researcher narrating her own case file"
    signoff: "End of report. File sealed."

# Visual style cycled by image_gen.py, one style per run (round-robin,
# tracked in state/history.json), so images don't look templated.
image_gen:
  provider: "pollinations"
  model: "flux"                     # pollinations model param
  width: 1080
  height: 1920
  styles:
    - "grainy 35mm film photograph, muted desaturated colors, deep shadows"
    - "dark oil painting, thick brushstrokes, chiaroscuro lighting"
    - "found-footage VHS still, scan lines, motion blur, timestamp overlay"
    - "charcoal sketch, high contrast, rough hatching, unfinished edges"
    - "digital matte painting, cold blue moonlight, heavy fog"

voice_gen:
  provider: "edge-tts"
  voice_map:                        # persona name -> edge-tts voice id
    "The Night Clerk": "en-US-GuyNeural"
    "Auntie Vex": "en-US-JennyNeural"
    "Dr. Marlowe": "en-GB-SoniaNeural"
  rate: "-2%"                       # slight slow-down reads better for horror pacing
  pitch: "+0Hz"

audio_mixer:
  music_volume_db: -22              # bed level under narration
  sfx_volume_db: -14
  duck_db: -18                      # how much music ducks while narration plays
  fade_out_sec: 2.0
  music_source: "freesound"         # "freesound" | "user_supplied" | "musicgen_experimental_nc"
  # "freesound": one CC0-licensed ambient track, auto-searched via Freesound.org's
  #   free API using "music_keyword" (director_agent rotates through
  #   freesound_music_keywords below, once per run), looped under the narration.
  #   CC0 has no attribution requirement and no commercial-use ambiguity. Requires
  #   a free FREESOUND_API_KEY env var -- see https://freesound.org/apiv2/apply/.
  #   A missing/failed match is a hard failure, same as user_supplied below.
  # "user_supplied": picks a random track from assets/music/ (clean, verifiable
  #   commercial license, but you have to source and add tracks yourself).
  # "musicgen_experimental_nc": as of 2026-07, Hugging Face's free Inference API no
  #   longer serves ANY text-to-audio model (confirmed live: every major text-to-audio
  #   model on HF -- MusicGen small/medium/large/melody, Stable Audio Open, Tango2 --
  #   shows an empty inferenceProviderMapping) -- this option is currently
  #   non-functional regardless of HF_API_TOKEN. Even when it worked, MusicGen's
  #   weights are CC-BY-NC 4.0 (NON-COMMERCIAL), so it was personal/offline preview
  #   only and never suitable for a monetized or public channel.
  musicgen:
    model: "facebook/musicgen-small"
    prompt: "dark ambient horror drone, slow unsettling pads, distant strings, no drums, no vocals"
  freesound_music_keywords:          # rotated round-robin per run by director_agent
    - "dark ambient horror drone"
    - "unsettling horror pad ambient"
    - "creepy tension drone loop"
    - "haunted ambient dark atmosphere"
    - "ominous horror soundscape"
  sfx_source: "freesound"           # "user_supplied" | "freesound"
  # "freesound": one CC0-licensed one-shot per scene, auto-searched via
  #   Freesound.org's free API using the "sfx_keyword" director_agent writes
  #   for each scene, timed to that scene's start. CC0 has no attribution
  #   requirement and no commercial-use ambiguity (unlike the MusicGen path
  #   above). Requires a free FREESOUND_API_KEY env var -- see
  #   https://freesound.org/apiv2/apply/. A scene whose keyword has no CC0
  #   match is skipped (logged), not a hard failure.
  # "user_supplied": picks one random track from assets/sfx/ for the whole video
  #   (or no SFX at all if that folder is empty) -- the original behavior.

video_assembler:
  width: 1080
  height: 1920
  fps: 30
  ken_burns_zoom_per_sec: 0.04      # slow zoom, avoids nausea-inducing motion
  caption:
    font: "Arial-Bold"
    font_size: 64
    color: "&HFFFFFF"               # ffmpeg ASS BGR hex, white
    outline_color: "&H000000"
    outline_width: 3
    max_words_per_caption: 3
    position: "bottom_safe"         # keeps captions clear of YouTube Shorts UI overlays

human_touch:
  rotate_persona: true
  rotate_visual_style: true
  write_pinned_comment_draft: true  # NOT auto-posted — see README

drive:
  folder_id: "1_nCdIqF9_u6fnDxjvoeIthFt47qrK_20"

youtube:
  category_id: "24"                 # Entertainment
  tags: ["horror", "scary stories", "AI horror", "shorts", "creepypasta"]
  self_certify_synthetic: true      # YouTube's AI-content disclosure flag
  privacy_status_public: "public"
  privacy_status_review: "unlisted"
